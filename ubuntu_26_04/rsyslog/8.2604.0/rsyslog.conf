# Collect log with UDP
$ModLoad imudp
$UDPServerAddress 127.0.0.1
$UDPServerRun 514

# Creating separate log files based on the severity
local0.* /home/shreyas/logs/haproxy/haproxy-traffic.log
local0.notice /home/shreyas/logs/haproxy/haproxy-admin.log
local0.err /home/shreyas/logs/haproxy/haproxy-error.log
local0.info /home/shreyas/logs/haproxy/haproxy-info.log
local0.crit /home/shreyas/logs/haproxy/haproxy-crit.log
local0.alert /home/shreyas/logs/haproxy/haproxy-alert.log
local0.emerg /home/shreyas/logs/haproxy/haproxy-emerg.log
local0.debug /home/shreyas/logs/haproxy/haproxy-debug.log
local0.warning /home/shreyas/logs/haproxy/haproxy-warning.log
