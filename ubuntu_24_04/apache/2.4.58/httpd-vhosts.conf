</VirtualHost>

<VirtualHost *:8081>
    DocumentRoot "/home/shreyas/workspace/myProjects/php/phalcon/phalcon-cric/public"
    ServerName cric.phalcon.com

    ErrorLog "/home/shreyas/logs/apache_phalcon_cric_error_log"
    CustomLog "/home/shreyas/logs/apache_phalcon_cric_access_log" common

    <Directory /home/shreyas/workspace/myProjects/php/phalcon/phalcon-cric/public>
    Options +Indexes +FollowSymLinks +ExecCGI +Includes
        AllowOverride all
        Allow from all
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        #SetHandler application/x-httpd-php
        SetHandler "proxy:fcgi://127.0.0.1:22051"
    </FilesMatch>

