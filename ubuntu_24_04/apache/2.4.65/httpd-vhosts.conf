<VirtualHost *:8081>
    DocumentRoot "/home/shreyas/programs/apache/2.4.65/htdocs"

    ErrorLog "/home/shreyas/programs/apache/2.4.65/logs/default_error_log"
    CustomLog "/home/shreyas/programs/apache/2.4.65/logs/default_access_log" common

    <Directory /home/shreyas/programs/apache/2.4.65/htdocs>
